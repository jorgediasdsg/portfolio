  <text x="106" y="50" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="700" fill="#FFFFFF">Jorge<tspan font-weight="800" fill="#8EC0FF">Resolve</tspan></text>
  <text x="108" y="72" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#CFE0FF">Tecnologia que resolve problema real.</text>
